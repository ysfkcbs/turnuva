
{% extends "base.html" %}
{% block title %}Kullanıcı Formu{% endblock %}

{% block content %}
<h1 class="h5 mb-3">
  {% if user %}Kullanıcı Düzenle{% else %}Yeni Kullanıcı{% endif %}
</h1>

<form method="post" class="card p-3" style="max-width:520px;">
  <div class="mb-3">
    <label class="form-label">Kullanıcı Adı</label>
    <input type="text" name="username" class="form-control"
           value="{{ user.username if user else '' }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">
      Şifre {% if user %}<small class="text-muted">(boş bırakılırsa değişmez)</small>{% endif %}
    </label>
    <input type="password" name="password" class="form-control"
           {% if not user %}required{% endif %}>
  </div>

  <div class="mb-3">
    <label class="form-label">Rol</label>
    <select name="role" class="form-select">
      <option value="standard" {% if user and user.role=="standard" %}selected{% endif %}>Standart</option>
      <option value="admin" {% if user and user.role=="admin" %}selected{% endif %}>Admin</option>
    </select>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
           {% if not user or user.is_active %}checked{% endif %}>
    <label class="form-check-label" for="is_active">Aktif</label>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary">Kaydet</button>
    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary">İptal</a>
  </div>
</form>
{% endblock %}
