
<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <title>Turnuvaya Başvur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4">Turnuvaya Başvur</h1>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('index') }}">← Ana Sayfa</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" class="card p-3">
        <div class="mb-3">
          <label class="form-label">Turnuva Türü</label>
          <select class="form-select" name="tournament_type_id" required>
            {% for t in types %}
              <option value="{{ t.id }}">{{ t.name }}</option>
            {% endfor %}
          </select>
        </div>
        <button class="btn btn-success">Başvur</button>
      </form>
    </div>
  </body>
</html>
