<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <title>Kullanıcı Ekle (Admin)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4">Kullanıcı Ekle</h1>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin_users') }}">← Kullanıcılar</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" class="card p-3" style="max-width: 520px;">
        <div class="mb-3">
          <label class="form-label">Kullanıcı Adı</label>
          <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Şifre</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Rol</label>
          <select class="form-select" name="role">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Okul</label>
          <select class="form-select" name="school_id">
            <option value="">—</option>
            {% for s in schools %}
              <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <button class="btn btn-primary">Kullanıcı Oluştur</button>
      </form>
    </div>
  </body>
</html>
