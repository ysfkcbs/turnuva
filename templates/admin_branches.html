{% extends "base.html" %}
{% block title %}Branş Yönetimi{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Branşlar</h1>
  <a href="{{ url_for('admin_branches_new') }}" class="btn btn-primary btn-sm">+ Yeni Branş</a>
</div>

<div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Ad</th>
        <th>Durum</th>
        <th>Kurallar (JSON)</th>
        <th style="width:210px;">İşlemler</th>
      </tr>
    </thead>
    <tbody>
      {% for b in branches %}
      <tr>
        <td class="fw-semibold">{{ b.name }}</td>
        <td>
          {% if b.is_active %}
            <span class="badge bg-success">Aktif</span>
          {% else %}
            <span class="badge bg-secondary">Pasif</span>
          {% endif %}
        </td>
        <td>
          <pre class="mb-0 small bg-light p-2 rounded" style="white-space:pre-wrap;">{{ b.rules_json }}</pre>
        </td>
        <td>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" href="{{ url_for('admin_branches_edit', branch_id=b.id) }}">Düzenle</a>

            <form method="post" action="{{ url_for('admin_branches_toggle', branch_id=b.id) }}">
              <button class="btn btn-outline-warning btn-sm" type="submit">
                {% if b.is_active %}Pasif Yap{% else %}Aktif Yap{% endif %}
              </button>
            </form>

            <form method="post" action="{{ url_for('admin_branches_delete', branch_id=b.id) }}"
                  onsubmit="return confirm('Branş silinsin mi?')">
              <button class="btn btn-outline-danger btn-sm" type="submit">Sil</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
