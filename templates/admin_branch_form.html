{% extends "base.html" %}
{% block title %}{% if branch %}Branş Düzenle{% else %}Yeni Branş{% endif %}{% endblock %}

{% block content %}
<h1 class="h4 mb-3">
  {% if branch %}Branş Düzenle{% else %}Yeni Branş{% endif %}
</h1>

<form method="post">
  <div class="mb-3">
    <label class="form-label">Branş Adı</label>
    <input
      type="text"
      name="name"
      class="form-control"
      required
      value="{{ branch.name if branch else '' }}"
      placeholder="Örn: Futbol"
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Kurallar (JSON)</label>
    <textarea
      name="rules_json"
      class="form-control"
      rows="8"
      required
      placeholder='{"score_type":"goals","allow_draw":true,"win_points":3,"draw_points":1,"loss_points":0}'
    >{{ branch.rules_json if branch else '{}' }}</textarea>
    <div class="form-text">
      score_type: goals | points | sets
    </div>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
           {% if branch is none or branch.is_active %}checked{% endif %}>
    <label class="form-check-label" for="is_active">Aktif</label>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Kaydet</button>
    <a href="{{ url_for('admin_branches') }}" class="btn btn-outline-secondary">İptal</a>
  </div>
</form>
{% endblock %}
