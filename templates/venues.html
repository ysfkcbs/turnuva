
{% extends "base.html" %}
{% block title %}Sahalar{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Sahalar</h1>
</div>

<form method="post" class="card p-3 mb-3">
  <div class="row g-2">
    <div class="col-md-5">
      <input type="text" class="form-control" name="name" placeholder="Saha adı" required>
    </div>
    <div class="col-md-5">
      <input type="text" class="form-control" name="address" placeholder="Adres (opsiyonel)">
    </div>
    <div class="col-md-2 d-grid">
      <button class="btn btn-primary">Ekle</button>
    </div>
  </div>
</form>

{% if venues and venues|length > 0 %}
<div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Ad</th>
        <th>Adres</th>
        <th style="width:120px;">İşlem</th>
      </tr>
    </thead>
    <tbody>
      {% for v in venues %}
      <tr>
        <td class="fw-semibold">{{ v.name }}</td>
        <td>{{ v.address or "-" }}</td>
        <td>
          <form method="post" action="{{ url_for('venues_delete', venue_id=v.id) }}"
                onsubmit="return confirm('Saha silinsin mi?')">
            <button class="btn btn-sm btn-outline-danger">Sil</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="alert alert-info">Henüz saha eklenmedi.</div>
{% endif %}

{% endblock %}
